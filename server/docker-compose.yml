services:
  pg:
    image: bitnami/postgresql:latest
    ports:
      - '5432:5432'
    environment:
      - POSTGRESQL_USERNAME=docker
      - POSTGRESQL_PASSWORD=docker
      - POSTGRESQL_DATABASE=shortener
    volumes:
      - postgres_data:/bitnami/postgresql
      - './docker:/docker-entrypoint-initdb.d'
  
  api:
    build: .
    ports:
      - '3333:3333'
    env_file:
      - .env
    depends_on:
      - pg

volumes:
  postgres_data: